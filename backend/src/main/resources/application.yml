spring:
  application:
    name: motolink
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pingpath}
    username: ${SPRING_DATASOURCE_USERNAME:pingpath}
    password: ${SPRING_DATASOURCE_PASSWORD:pingpath_dev}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 10000
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 2000ms
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /api/v1
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

motolink:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-this-is-only-for-local-dev-32bytes}
    access-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:60}
    refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:30}
  netty:
    tcp-port: ${NETTY_TCP_PORT:5023}
    boss-threads: 1
    worker-threads: 4
    idle-read-seconds: 600
  seed:
    enabled: ${PINGPATH_SEED_ENABLED:false}
    admin-email: ${PINGPATH_SEED_ADMIN_EMAIL:admin@pingpath.local}
    admin-password: ${PINGPATH_SEED_ADMIN_PASSWORD:changeme}
  push:
    # Alarm push notifications via the Expo Push Service (relays to FCM/APNs).
    enabled: ${PINGPATH_PUSH_ENABLED:true}
    expo-url: https://exp.host/--/api/v2/push/send
    # Optional Expo access token (Expo dashboard → Access tokens); blank = unauthenticated.
    access-token: ${PINGPATH_EXPO_ACCESS_TOKEN:}

logging:
  level:
    root: INFO
    com.webinnovation.motolink: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
