spring:
  jpa:
    open-in-view: false

logging:
  level:
    root: WARN
    com.webinnovation.motolink: INFO

motolink:
  cors:
    # Env var name intentionally kept as PINGPATH_* (CLAUDE.md §1); the property
    # prefix is motolink.*, so bind it explicitly rather than via relaxed binding.
    allowed-origins: ${PINGPATH_CORS_ALLOWED_ORIGINS:https://app.pingpath.com}
  seed:
    enabled: false
