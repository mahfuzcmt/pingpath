# PingPath nginx reverse-proxy — Phase 2 (TLS + DNS).
# Drop into /etc/nginx/sites-available/pingpath and symlink into sites-enabled/.
# certbot --nginx -d <hostname> will rewrite the listen directives to add 443 + cert paths.
#
# What this proxies:
#   /api/v1/*  → backend container, REST
#   /ws        → backend container, STOMP-over-WebSocket (with Upgrade headers)
#   /          → frontend container, Next.js
#
# Netty TCP (port 5023) is NOT proxied here. GT06 devices don't speak TLS,
# and nginx's stream module would just pass bytes through anyway. Devices
# connect directly to the host on :5023.

upstream pingpath_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

upstream pingpath_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;     # certbot will rewrite to your real hostname

    # Reasonable body size cap — uploads aren't a feature, but reports might be
    client_max_body_size 10m;

    # Security headers (HSTS added by certbot once 443 is live)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ----- Backend REST -----
    location /api/v1/ {
        proxy_pass http://pingpath_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
    }

    # ----- WebSocket (STOMP) -----
    location /ws {
        proxy_pass http://pingpath_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;          # WS connections live long
        proxy_send_timeout  3600s;
    }

    # ----- Frontend (Next.js) -----
    location / {
        proxy_pass http://pingpath_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }
}
